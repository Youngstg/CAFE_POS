name: Customer Web CI / TypeScript Build & Lint

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/customer-web/**'
      - '.github/workflows/customer-web-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/customer-web/**'
      - '.github/workflows/customer-web-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./apps/customer-web

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './apps/customer-web/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
